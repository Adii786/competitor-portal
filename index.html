<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dollar Stationery — Competitor Intel Portal</title>
<script>
// Robust Supabase loader with fallback CDN
(function() {
  var script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
  script.onerror = function() {
    // Fallback to unpkg if jsdelivr fails
    var s2 = document.createElement('script');
    s2.src = 'https://unpkg.com/@supabase/supabase-js@2';
    document.head.appendChild(s2);
  };
  document.head.appendChild(script);
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"></noscript>
<style>
/* ── CSS Variables ── */
:root {
  --navy:#0f1f3d; --navy2:#162a52; --gold:#c8922a; --gold-lt:#f0b84a;
  --cream:#f5f0e8; --slate:#2c3e5e; --red:#c0392b; --green:#1a6b3c;
  --green-lt:#27ae60; --amber:#d97706; --sky:#1e6fa8; --white:#ffffff;
  --grey1:#f8f9fb; --grey2:#eef0f4; --grey3:#d1d5de; --grey4:#8891a4;
  --text:#1a1f2e; --radius:12px;
  --shadow:0 4px 24px rgba(15,31,61,0.10);
  --shadow-lg:0 12px 48px rgba(15,31,61,0.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--grey1);color:var(--text);min-height:100vh}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh}
.screen.active{display:flex}

/* ── LOGIN ── */
#screen-login{align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 60%,#1a3a6b 100%)}
.login-wrap{display:flex;flex-direction:column;align-items:center;gap:0}
.login-logo-area{text-align:center;margin-bottom:32px}
.login-logo{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;
  color:var(--gold-lt);letter-spacing:-0.5px}
.login-tagline{color:rgba(255,255,255,0.45);font-size:13px;margin-top:4px;font-weight:300}
.login-card{background:rgba(255,255,255,0.07);backdrop-filter:blur(24px);
  border:1px solid rgba(200,146,42,0.25);border-radius:20px;padding:40px 36px;width:420px}
.login-tab-row{display:flex;gap:6px;margin-bottom:28px;background:rgba(0,0,0,0.2);
  border-radius:10px;padding:4px}
.login-tab{flex:1;padding:10px;border:none;background:transparent;color:rgba(255,255,255,0.5);
  font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;
  border-radius:7px;transition:all .2s}
.login-tab.active{background:rgba(200,146,42,0.25);color:var(--gold-lt);font-weight:600}
.field-label{color:rgba(255,255,255,0.6);font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.7px;margin-bottom:6px;display:block}
.field-wrap{margin-bottom:16px}
.login-input{width:100%;padding:12px 14px;background:rgba(255,255,255,0.09);
  border:1.5px solid rgba(255,255,255,0.12);border-radius:9px;color:white;
  font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.login-input:focus{border-color:var(--gold);background:rgba(255,255,255,0.12)}
.login-input option{background:#162a52}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold-lt));
  border:none;border-radius:10px;color:var(--navy);font-family:'Syne',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s;
  letter-spacing:0.2px}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(200,146,42,0.4)}
.login-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.login-error{background:rgba(192,57,43,0.2);border:1px solid rgba(192,57,43,0.4);
  color:#ff8a80;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;
  display:none}
.login-error.show{display:block}
.login-info{background:rgba(30,111,168,0.15);border:1px solid rgba(30,111,168,0.3);
  color:#90caf9;padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;
  line-height:1.6}


/* ── APP SHELL ── */
#screen-app{flex-direction:column}
.topbar{background:var(--navy);height:58px;display:flex;align-items:center;
  padding:0 24px;justify-content:space-between;position:sticky;top:0;z-index:200;
  box-shadow:0 2px 16px rgba(0,0,0,0.25)}
.tb-brand{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;
  color:var(--gold-lt);display:flex;align-items:center;gap:8px}
.tb-right{display:flex;align-items:center;gap:16px}
.period-badge{background:rgba(200,146,42,0.15);border:1px solid rgba(200,146,42,0.3);
  padding:5px 13px;border-radius:20px;color:var(--gold-lt);font-size:12px;
  font-weight:500;cursor:pointer;white-space:nowrap}
.period-badge:hover{background:rgba(200,146,42,0.25)}
.user-chip{display:flex;align-items:center;gap:9px}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-lt));
  display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;
  font-size:12px;font-weight:700;color:var(--navy);flex-shrink:0}
.user-info{display:flex;flex-direction:column}
.user-name-tb{color:rgba(255,255,255,0.9);font-size:13px;font-weight:500;line-height:1.2}
.user-role-tb{color:rgba(255,255,255,0.4);font-size:10px;text-transform:uppercase;letter-spacing:0.5px}
.logout-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
  padding:6px 13px;border-radius:8px;color:rgba(255,255,255,0.5);font-size:12px;
  cursor:pointer;transition:all .2s}
.logout-btn:hover{background:rgba(192,57,43,0.25);border-color:var(--red);color:#ff7675}

.app-body{display:flex;flex:1;overflow:hidden}
.sidebar{width:200px;background:var(--navy2);flex-shrink:0;padding:16px 10px;
  display:flex;flex-direction:column;gap:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:9px;
  border:none;background:transparent;color:rgba(255,255,255,0.55);font-family:'Inter',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;width:100%;text-align:left;transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85)}
.nav-item.active{background:rgba(200,146,42,0.2);color:var(--gold-lt);font-weight:600}
.nav-item .nav-icon{font-size:15px;flex-shrink:0}
.nav-section{font-size:10px;font-weight:700;color:rgba(255,255,255,0.2);
  text-transform:uppercase;letter-spacing:1px;padding:12px 14px 4px;margin-top:4px}
.main-area{flex:1;overflow-y:auto;padding:24px}
.view{display:none}
.view.active{display:block}

/* ── COMPONENTS ── */
.page-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;
  color:var(--navy);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--grey4);margin-bottom:22px}
.card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
.card-header{padding:18px 22px;border-bottom:1px solid var(--grey2);
  display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--navy)}
.card-body{padding:22px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px}
.kpi{background:white;border-radius:12px;padding:18px;box-shadow:var(--shadow);
  border-left:3px solid var(--grey3);position:relative}
.kpi.kpi-navy{border-left-color:var(--navy)} .kpi.kpi-gold{border-left-color:var(--gold)}
.kpi.kpi-green{border-left-color:var(--green-lt)} .kpi.kpi-red{border-left-color:var(--red)}
.kpi.kpi-sky{border-left-color:var(--sky)}
.kpi-label{font-size:10px;font-weight:700;color:var(--grey4);text-transform:uppercase;
  letter-spacing:0.7px;margin-bottom:8px}
.kpi-val{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:var(--navy);line-height:1}
.kpi-hint{font-size:11px;color:var(--grey4);margin-top:5px}
.kpi-ico{position:absolute;right:14px;top:14px;font-size:22px;opacity:0.12}

/* Form */
.fg-row{display:grid;gap:14px;margin-bottom:14px}
.fg-4{grid-template-columns:repeat(4,1fr)} .fg-3{grid-template-columns:repeat(3,1fr)}
.fg-2{grid-template-columns:repeat(2,1fr)} .fg-1{grid-template-columns:1fr}
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:11px;font-weight:600;color:var(--grey4);text-transform:uppercase;letter-spacing:0.6px}
.fc{padding:10px 13px;border:1.5px solid var(--grey3);border-radius:8px;font-family:'Inter',sans-serif;
  font-size:13px;color:var(--text);background:var(--grey1);outline:none;transition:border-color .2s}
.fc:focus{border-color:var(--navy);background:white}
.fc.inp{border-color:var(--gold-lt);background:#fffdf5}

/* Table */
.tbl-wrap{overflow-x:auto;border:1px solid var(--grey2);border-radius:10px}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{background:var(--navy);color:white;padding:9px 11px;text-align:left;
  font-family:'Syne',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:0.4px;
  white-space:nowrap;position:sticky;top:0;z-index:5}
.tbl td{padding:7px 10px;border-bottom:1px solid var(--grey2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafbfc}
.tbl tr.cat-row td{background:var(--navy2);color:white;font-family:'Syne',sans-serif;
  font-weight:700;font-size:10px;letter-spacing:1px;padding:6px 11px}
.tbl tr.new-row td{background:#f0fdf4}
.ti{width:100%;padding:5px 8px;border:1.5px solid var(--grey3);border-radius:6px;
  font-family:'Inter',sans-serif;font-size:12px;background:white;outline:none}
.ti:focus{border-color:var(--navy)}
.ti.net-price{background:#eff7ff;border-color:#b8d4ef;font-weight:700;
  color:var(--sky);text-align:right;cursor:default}

/* Buttons */
.btn{padding:10px 20px;border-radius:8px;border:none;font-family:'Inter',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;
  display:inline-flex;align-items:center;gap:7px}
.btn-navy{background:var(--navy);color:white} .btn-navy:hover{background:var(--navy2)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-lt));color:var(--navy)}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(200,146,42,0.3)}
.btn-green{background:var(--green);color:white}
.btn-outline{background:transparent;border:1.5px solid var(--grey3);color:var(--grey4)}
.btn-outline:hover{border-color:var(--navy);color:var(--navy)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-red{background:var(--red);color:white}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;
  font-size:11px;font-weight:600}
.b-green{background:#e8f5e9;color:var(--green)} .b-amber{background:#fff8e1;color:var(--amber)}
.b-red{background:#fce4d6;color:var(--red)} .b-sky{background:#e3f2fd;color:var(--sky)}
.b-navy{background:#e8edf5;color:var(--navy)} .b-new{background:#e8f5e9;color:var(--green)}

/* Cards for submissions */
.sub-item{border:1.5px solid var(--grey2);border-radius:10px;padding:14px 18px;
  margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;transition:all .2s;background:white}
.sub-item:hover{border-color:var(--navy);background:var(--grey1)}
.sub-title{font-weight:600;font-size:14px;color:var(--navy)}
.sub-meta{font-size:12px;color:var(--grey4);margin-top:2px}
.sub-right{display:flex;align-items:center;gap:10px}

/* Filter bar */
.fbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:12px 16px;
  background:var(--grey2);border-radius:10px;margin-bottom:18px;font-size:12px}
.fbar label{font-weight:600;color:var(--grey4);text-transform:uppercase;
  letter-spacing:0.5px;font-size:10px}
.fbar select,.fbar input{padding:6px 11px;border:1.5px solid var(--grey3);border-radius:7px;
  font-size:12px;background:white;color:var(--text);outline:none}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(10,15,30,0.65);
  backdrop-filter:blur(4px);z-index:500;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:white;border-radius:16px;overflow:hidden;
  box-shadow:var(--shadow-lg);max-width:650px;width:92%}
.modal-head{padding:18px 24px;background:var(--navy);color:white;
  font-family:'Syne',sans-serif;font-size:15px;font-weight:700;
  display:flex;align-items:center;justify-content:space-between}
.modal-body{padding:22px;max-height:65vh;overflow-y:auto}
.modal-foot{padding:14px 22px;background:var(--grey1);border-top:1px solid var(--grey2);
  display:flex;justify-content:flex-end;gap:10px}
.mc-btn{background:rgba(255,255,255,0.15);border:none;color:white;width:26px;
  height:26px;border-radius:6px;cursor:pointer;font-size:15px;display:flex;
  align-items:center;justify-content:center}

/* New intel */
.intel-item{background:#f0fdf4;border:1.5px solid #a9dfbf;border-radius:9px;
  padding:12px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px}
.intel-badge{background:var(--green);color:white;padding:2px 10px;border-radius:12px;
  font-size:10px;font-weight:700;text-transform:uppercase;flex-shrink:0;margin-top:2px}
.intel-text{flex:1;font-size:13px;line-height:1.6}
.intel-by{font-size:11px;color:var(--grey4);white-space:nowrap;text-align:right;flex-shrink:0}

/* Submission tracker table */
.tracker-pending{color:var(--amber)}
.tracker-done{color:var(--green-lt)}

/* Loading */
.loading-overlay{position:fixed;inset:0;background:rgba(10,15,30,0.7);z-index:900;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.spinner{width:40px;height:40px;border:3px solid rgba(200,146,42,0.3);
  border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
.loading-text{color:rgba(255,255,255,0.7);font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast-box{position:fixed;bottom:22px;right:22px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;
  box-shadow:var(--shadow-lg);animation:slideIn .3s;display:flex;align-items:center;gap:9px}
.t-success{background:var(--green);color:white} .t-error{background:var(--red);color:white}
.t-info{background:var(--navy);color:white}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:none;opacity:1}}

/* Bar chart */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:130px;padding-bottom:4px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:0}
.bar-fill{width:100%;border-radius:4px 4px 0 0;background:var(--navy);transition:height .5s}
.bar-lbl{font-size:8.5px;color:var(--grey4);text-align:center;word-break:break-word;line-height:1.3}
.bar-num{font-size:9px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace}

/* Section divider */
.sdiv{display:flex;align-items:center;gap:10px;margin:20px 0 14px}
.sdiv-line{flex:1;height:1px;background:var(--grey2)}
.sdiv-lbl{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;
  background:var(--navy);color:white;padding:3px 14px;border-radius:20px;white-space:nowrap}

/* Setup notice */
.setup-notice{background:linear-gradient(135deg,#1a3a6b,var(--navy2));
  border:1px solid rgba(200,146,42,0.3);border-radius:12px;padding:20px 24px;
  color:white;margin-bottom:20px}
.setup-notice h3{font-family:'Syne',sans-serif;font-size:16px;margin-bottom:8px;color:var(--gold-lt)}
.setup-notice p{font-size:13px;color:rgba(255,255,255,0.7);line-height:1.6}
.setup-notice code{background:rgba(0,0,0,0.3);padding:2px 7px;border-radius:4px;
  font-family:'DM Mono',monospace;font-size:12px;color:var(--gold-lt)}
</style>
</head>
<body>

<!-- ══ LOADING ══ -->
<div class="loading-overlay" id="loading" style="display:none">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Loading...</div>
</div>

<!-- ══ TOAST ══ -->
<div class="toast-box" id="toasts"></div>

<!-- ══ SCREEN: LOGIN ══ -->
<div class="screen" id="screen-login">
  <div class="login-wrap">
    <div class="login-logo-area">
      <div class="login-logo">◆ Dollar Stationery</div>
      <div class="login-tagline">Competitor Intelligence Portal · Pakistan Operations</div>
    </div>
    <div class="login-card">
      <div class="login-tab-row">
        <button class="login-tab active" onclick="setLoginMode('login')" id="lt-login">Sign In</button>
        <button class="login-tab" onclick="setLoginMode('signup')" id="lt-signup">Create Account</button>
      </div>
      <div class="login-error" id="login-error"></div>
      <div id="login-info-box" class="login-info" style="display:none"></div>

      <!-- Sign In -->
      <div id="form-login">
        <div class="field-wrap">
          <label class="field-label">Email Address</label>
          <input class="login-input" type="email" id="l-email" placeholder="you@dollarpk.com" autocomplete="email">
        </div>
        <div class="field-wrap">
          <label class="field-label">Password</label>
          <input class="login-input" type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="login-btn" onclick="doLogin()" id="btn-login">Sign In →</button>
      </div>

      <!-- Sign Up -->
      <div id="form-signup" style="display:none">
        <div class="fg-row fg-2">
          <div class="field-wrap">
            <label class="field-label">Full Name</label>
            <input class="login-input" type="text" id="s-name" placeholder="Muhammad Ahmed">
          </div>
          <div class="field-wrap">
            <label class="field-label">Role</label>
            <select class="login-input" id="s-role">
              <option value="field">Field TSS / TSM</option>
              <option value="supervisor">Supervisor</option>
              <option value="rsm">RSM / Manager</option>
              <option value="ho">Head Office / Admin</option>
            </select>
          </div>
        </div>
        <div class="field-wrap">
          <label class="field-label">Town / Territory</label>
          <select class="login-input" id="s-town">
            <option value="">— Select Town —</option>
          </select>
        </div>
        <div class="field-wrap">
          <label class="field-label">Email Address</label>
          <input class="login-input" type="email" id="s-email" placeholder="you@dollarpk.com">
        </div>
        <div class="field-wrap">
          <label class="field-label">Password (min 8 chars)</label>
          <input class="login-input" type="password" id="s-pass" placeholder="••••••••">
        </div>
        <button class="login-btn" onclick="doSignup()" id="btn-signup">Create Account →</button>
      </div>

      <div style="text-align:center;margin-top:16px">
        <span style="color:rgba(255,255,255,0.3);font-size:12px">
          Field team: contact your RSM for account creation
        </span>
      </div>
    </div>
  </div>
</div>

<!-- ══ SCREEN: APP ══ -->
<div class="screen" id="screen-app">
  <div class="topbar">
    <div class="tb-brand">◆ Competitor Intel</div>
    <div class="tb-right">
      <div class="period-badge" id="tb-period" onclick="openPeriodModal()">📅 —</div>
      <div class="user-chip">
        <div class="avatar" id="tb-avatar">?</div>
        <div class="user-info">
          <div class="user-name-tb" id="tb-name">—</div>
          <div class="user-role-tb" id="tb-role">—</div>
        </div>
      </div>
      <button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="app-body">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-area" id="main-area">
      <!-- Views injected here -->
      <div class="view active" id="view-entry"></div>

async function startup() {
  // Populate town dropdowns
  const td = document.getElementById('s-town');
  TOWNS.forEach(t => td.innerHTML += `<option>${t}</option>`);

  if (!initSupabase()) {
    // Credentials not set — show developer notice instead of config screen
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0f1f3d;color:white;font-family:sans-serif;flex-direction:column;gap:16px;padding:32px;text-align:center"><div style="font-size:48px">🔧</div><div style="font-size:22px;font-weight:700;color:#f0b84a">Supabase Not Configured</div><div style="color:rgba(255,255,255,0.7);font-size:14px;max-width:480px;line-height:1.7">Open <strong>index.html</strong> in a text editor and replace <code style=\'background:rgba(0,0,0,0.4);padding:2px 8px;border-radius:4px;color:#f0b84a\'>YOUR_SUPABASE_URL_HERE</code> and <code style=\'background:rgba(0,0,0,0.4);padding:2px 8px;border-radius:4px;color:#f0b84a\'>YOUR_SUPABASE_ANON_KEY_HERE</code> with your actual credentials from supabase.com → Settings → API</div></div>';
    return;
  }

  // Check existing session
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    await loadProfile(session.user);
  } else {
    showScreen('screen-login');
  }

  // Auth state listener
  db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) await loadProfile(session.user);
    else if (event === 'SIGNED_OUT') showScreen('screen-login');
  });
}

async function loadProfile(user) {
  showLoading('Loading your profile...');
  const { data, error } = await supabase
    .from('profiles').select('*').eq('id', user.id).single();
  if (error || !data) {
    hideLoading();
    showScreen('screen-login');
    showError('Profile not found. Contact your administrator.');
    return;
  }
  currentUser = user;
  currentProfile = data;

  // Load saved period
  const sp = localStorage.getItem('period');
  if (sp) currentPeriod = JSON.parse(sp);

  // Update topbar
  document.getElementById('tb-avatar').textContent = data.full_name.charAt(0).toUpperCase();
  document.getElementById('tb-name').textContent = data.full_name;
  document.getElementById('tb-role').textContent = roleLabel(data.role);
  updatePeriodBadge();

  // Build nav
  buildNav();
  hideLoading();
  showScreen('screen-app');
  navigateTo('entry');
}

function roleLabel(r) {
  return {field:'Field TSS/TSM',supervisor:'Supervisor',rsm:'RSM / Manager',ho:'Head Office'}[r]||r;
}

// ══════════════════════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════════════════════
function setLoginMode(mode) {
  document.getElementById('form-login').style.display = mode==='login'?'':'none';
  document.getElementById('form-signup').style.display = mode==='signup'?'':'none';
  document.getElementById('lt-login').classList.toggle('active', mode==='login');
  document.getElementById('lt-signup').classList.toggle('active', mode==='signup');
  clearLoginError();
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass = document.getElementById('l-pass').value;
  if (!email || !pass) { showError('Please enter email and password'); return; }
  setBtn('btn-login', true, 'Signing in...');
  const { error } = await db.auth.signInWithPassword({email, password: pass});
  setBtn('btn-login', false, 'Sign In →');
  if (error) showError(error.message);
}

async function doSignup() {
  const name = document.getElementById('s-name').value.trim();
  const role = document.getElementById('s-role').value;
  const town = document.getElementById('s-town').value;
  const email = document.getElementById('s-email').value.trim();
  const pass = document.getElementById('s-pass').value;
  if (!name||!email||!pass||!town) { showError('Please fill all fields'); return; }
  if (pass.length < 8) { showError('Password must be at least 8 characters'); return; }
  setBtn('btn-signup', true, 'Creating...');
  const { data, error } = await db.auth.signUp({email, password: pass,
    options: { data: { full_name: name, role, town }}});
  setBtn('btn-signup', false, 'Create Account →');
  if (error) { showError(error.message); return; }
  // Insert profile
  if (data.user) {
    await db.from('profiles').upsert({
      id: data.user.id, full_name: name, role, town, email
    });
  }
  clearLoginError();
  document.getElementById('login-info-box').style.display = '';
  document.getElementById('login-info-box').textContent =
    '✅ Account created! Check your email to verify, then sign in.';
  setLoginMode('login');
}

async function doLogout() {
  await db.auth.signOut();
  currentUser = null; currentProfile = null;
  showScreen('screen-login');
}

function setBtn(id, disabled, text) {
  const b = document.getElementById(id);
  if (b) { b.disabled = disabled; b.textContent = text; }
}
function showError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = '⚠ ' + msg; el.classList.add('show');
}
function clearLoginError() {
  document.getElementById('login-error').classList.remove('show');
  document.getElementById('login-info-box').style.display = 'none';
}

// NAVIGATION
// ══════════════════════════════════════════════════════════════════════
function buildNav() {
  const role = currentProfile.role;
  const isHO = ['ho','rsm','supervisor'].includes(role);
  const navItems = [
    ...(role==='field'||role==='supervisor'?[{id:'entry',icon:'📝',label:'Enter Data'},{id:'myreports',icon:'📋',label:'My Reports'}]:[]),
    ...(isHO ? [
      {section:'Head Office'},
      {id:'dashboard',icon:'📊',label:'Dashboard'},
      {id:'allsubs',icon:'📂',label:'All Submissions'},
      {id:'intel',icon:'🆕',label:'New Intel'},
      ...(role==='ho'?[{id:'users',icon:'👥',label:'User Management'}]:[]),
    ] : []),
  ];

  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = navItems.map(item => item.section
    ? `<div class="nav-section">${item.section}</div>`
    : `<button class="nav-item" id="nav-${item.id}" onclick="navigateTo('${item.id}')">
        <span class="nav-icon">${item.icon}</span>${item.label}
       </button>`
  ).join('');
}

function navigateTo(view) {
  currentView = view;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const viewEl = document.getElementById('view-'+view);
  const navEl = document.getElementById('nav-'+view);
  if (viewEl) viewEl.classList.add('active');
  if (navEl) navEl.classList.add('active');
  renderView(view);
}

async function renderView(view) {
  if (view==='entry') await renderEntry();
  else if (view==='myreports') await renderMyReports();
  else if (view==='dashboard') await renderDashboard();
  else if (view==='allsubs') await renderAllSubs();
  else if (view==='intel') await renderIntel();
  else if (view==='users') await renderUsers();
}

          <button class="btn btn-gold" onclick="submitForm()">✓ Submit Report</button>

          <div style="margin-left:auto;font-size:11px;color:var(--grey4)">
            Only rows with a Trade Price entered will be saved
          </div>
        </div>
      </div>

}

function calcNet(rid) {
  const tp = parseFloat(document.getElementById(rid+'_tp')?.value)||0;
  const dc = parseFloat(document.getElementById(rid+'_dc')?.value)||0;
  const el = document.getElementById(rid+'_np');
  if (el) el.value = tp > 0 ? (tp*(1-dc/100)).toFixed(2) : '';
}
function calcNewNet(i) {
  const tp = parseFloat(document.getElementById('nw'+i+'_tp')?.value)||0;
  const dc = parseFloat(document.getElementById('nw'+i+'_dc')?.value)||0;
  const el = document.getElementById('nw'+i+'_np');
  if (el) el.value = tp > 0 ? (tp*(1-dc/100)).toFixed(2) : '';
}

async function submitForm() {
  const periodKey = `${currentPeriod.month}_${currentPeriod.year}_${currentPeriod.fortnight}`;
  const entries = [];
  const newEntries = [];

  CATEGORIES.forEach(cat => {
    PRODUCTS[cat].forEach(p => {
      const rid = `${cat}__${p.co}__${p.brand}`.replace(/[\s+/()#.]/g,'_');
      const tp = parseFloat(document.getElementById(rid+'_tp')?.value);
      if (!tp || isNaN(tp)) return;
      entries.push({
        category:cat, company:p.co, brand:p.brand,
        ranking:document.getElementById(rid+'_rk')?.value||'',
        pcs:document.getElementById(rid+'_pc')?.value||'',
        trade_price:tp,
        discount_pct:parseFloat(document.getElementById(rid+'_dc')?.value)||0,
        net_price:parseFloat(document.getElementById(rid+'_np')?.value)||0,
        scheme:document.getElementById(rid+'_sc')?.value||'',
        notes:document.getElementById(rid+'_nt')?.value||'',
        is_new_product:false
      });
    });
  });

  for (let i=1;i<=6;i++) {
    const co = document.getElementById('nw'+i+'_co')?.value.trim();
    const br = document.getElementById('nw'+i+'_br')?.value.trim();
    if (!co && !br) continue;
    newEntries.push({
      category:document.getElementById('nw'+i+'_ca')?.value||'',
      company:co, brand:br,
      ranking:document.getElementById('nw'+i+'_rk')?.value||'',
      pcs:'',
      trade_price:parseFloat(document.getElementById('nw'+i+'_tp')?.value)||0,
      discount_pct:parseFloat(document.getElementById('nw'+i+'_dc')?.value)||0,
      net_price:parseFloat(document.getElementById('nw'+i+'_np')?.value)||0,
      scheme:document.getElementById('nw'+i+'_sc')?.value||'',
      notes:document.getElementById('nw'+i+'_nt')?.value||'',
      is_new_product:true
    });
  }

  if (!entries.length && !newEntries.length) {
    toast('Please enter at least one Trade Price','error'); return;
  }

  showLoading('Submitting your report...');

  // Upsert submission
  const subData = {
    user_id: currentUser.id,
    period_key: periodKey,
    period_month: currentPeriod.month,
    period_year: currentPeriod.year,
    period_fortnight: currentPeriod.fortnight,
    town: currentProfile.town,
    full_name: currentProfile.full_name,
    total_products: entries.length + newEntries.length,
    new_product_count: newEntries.length,
    submitted_at: new Date().toISOString()
  };

  // Check existing submission for this user+period
  const { data: existing } = await db.from('submissions')
    .select('id').eq('user_id', currentUser.id).eq('period_key', periodKey).maybeSingle();

  let subId;
  if (existing) {
    await db.from('submissions').update(subData).eq('id', existing.id);
    await db.from('submission_entries').delete().eq('submission_id', existing.id);
    subId = existing.id;
  } else {
    const { data: ins } = await db.from('submissions').insert(subData).select('id').single();
    subId = ins?.id;
  }

  if (!subId) { hideLoading(); toast('Error saving submission','error'); return; }

  // Insert entries
  const allEntries = [...entries,...newEntries].map(e=>({...e, submission_id:subId, user_id:currentUser.id}));
  await db.from('submission_entries').insert(allEntries);

  hideLoading();
  toast(`Report submitted! ${entries.length} products + ${newEntries.length} new entries.`,'success');
  setTimeout(()=>renderEntry(),600);
}

function exportCurrentCSV() {
  if (!detailSubData) return;
  const {sub, entries} = detailSubData;
  const hdrs = ['Person','Town','Period','Category','Company','Brand','Ranking','Pcs','Trade Price','Disc%','Net Price','Scheme','Notes','Is New'];
  const rows = entries.map(e=>[
    sub.full_name, sub.town, `${sub.period_month} ${sub.period_year} ${sub.period_fortnight}`,
    e.category, e.company, e.brand, e.ranking, e.pcs,
    e.trade_price, e.discount_pct, e.net_price, e.scheme, e.notes, e.is_new_product?'Yes':'No'
  ].map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(','));
  const csv = [hdrs.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `competitor_${sub.full_name}_${sub.period_month}${sub.period_year}.csv`;
  a.click();
}

          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Town</th><th>Created</th></tr></thead>
          <tbody>${(data||[]).map(u=>`<tr>
            <td><strong>${u.full_name}</strong></td>
            <td style="font-size:12px">${u.email||'—'}</td>
            <td><span class="badge ${u.role==='ho'?'b-navy':u.role==='rsm'?'b-sky':u.role==='supervisor'?'b-amber':'b-green'}">${roleLabel(u.role)}</span></td>
            <td>${u.town||'—'}</td>
            <td style="font-size:11px">${u.created_at?new Date(u.created_at).toLocaleDateString('en-PK'):'—'}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showLoading(msg) {
  document.getElementById('loading-text').textContent = msg;
  document.getElementById('loading').style.display = 'flex';
}
function hideLoading() { document.getElementById('loading').style.display = 'none'; }
function toast(msg, type='info') {
  const box = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast t-${type}`;
  t.innerHTML = `${type==='success'?'✅':type==='error'?'⚠️':'ℹ️'} ${msg}`;
  box.appendChild(t);
  setTimeout(()=>t.remove(), 3800);
}

// Startup — wrapped in DOMContentLoaded for safety
function safeStartup() {
  if (typeof window.supabase === 'undefined') {
    // Supabase not loaded yet, wait 500ms and retry
    setTimeout(safeStartup, 500);
    return;
  }
  startup().catch(function(e) {
    console.error('Startup error:', e);
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0f1f3d;color:white;flex-direction:column;gap:16px;font-family:sans-serif;text-align:center;padding:24px"><div style="font-size:48px">⚠️</div><div style="font-size:20px;font-weight:700">Portal loading error</div><div style="color:rgba(255,255,255,0.6);font-size:14px">Error: ' + e.message + '</div><button onclick="location.reload()" style="padding:12px 24px;background:#c8922a;border:none;border-radius:8px;color:#0f1f3d;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px">Reload Page</button></div>';
  });
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', safeStartup);
} else {
  safeStartup();
}
</script>
